<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>語録ジェネレーター</title>
<script src="https://unpkg.com/kuromoji@0.1.2/dist/kuromoji.js"></script>
<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
textarea { width: 90%; height: 120px; }
button { padding: 10px 20px; margin-top: 10px; }
#output { margin-top: 20px; font-size: 1.2em; }
</style>
</head>
<body>

<h2></h2>
<textarea id="inputText" placeholder="例：\n今日は眠い\nラーメン食べたい"></textarea><br>
<button onclick="generate()">生成</button>

<div id="output">読み込み中...</div>

<script>
let tokenizer;

// Kuromoji 初期化
kuromoji.builder({
  dicPath: "https://unpkg.com/kuromoji@0.1.2/dict/"
}).build(function (err, t) {
  tokenizer = t;
  document.getElementById("output").innerText = "準備完了！";
});

function tokenize(text) {
  return tokenizer.tokenize(text).map(t => t.surface_form);
}

function buildMarkov(words) {
  const chain = {};
  for (let i = 0; i < words.length - 1; i++) {
    const w = words[i];
    const next = words[i + 1];
    if (!chain[w]) chain[w] = [];
    chain[w].push(next);
  }
  return chain;
}

function generateSentence(chain, length = 20) {
  const keys = Object.keys(chain);
  let word = keys[Math.floor(Math.random() * keys.length)];
  let result = [word];

  for (let i = 0; i < length; i++) {
    if (!chain[word]) break;
    const nextWords = chain[word];
    word = nextWords[Math.floor(Math.random() * nextWords.length)];
    result.push(word);
  }

  return result.join("");
}

function generate() {
  if (!tokenizer) {
    alert("まだ準備中です");
    return;
  }

  const text = document.getElementById("inputText").value;
  const words = tokenize(text);
  const chain = buildMarkov(words);
  const sentence = generateSentence(chain);

  document.getElementById("output").innerText = sentence;
}
</script>

</body>
</html>
